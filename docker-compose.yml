services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  vector-store:
    image: qdrant/qdrant:latest
    container_name: vector-store
    ports:
      - "6333:6333"
    volumes:
      - vector_store_data:/qdrant/storage


volumes:
  ollama_data:
  vector_store_data: